name: Format Code

on:
  push:
    branches: [ "main", "4-local-descent" ]

# 로봇이 코드를 수정해서 다시 push 할 수 있도록 '쓰기 권한' 부여
permissions:
  contents: write

jobs:
  format:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Install clang-format
        run: sudo apt-get install -y clang-format

      - name: Run clang-format
        # include와 test 폴더 안의 모든 .cpp, .hpp 파일을 찾아 강제 정렬 (-i)
        run: |
          find include test -name '*.cpp' -o -name '*.hpp' | xargs clang-format -i

      - name: Auto-commit formatted code
        # 예쁘게 정렬된 코드를 로봇이 직접 커밋하고 푸시합니다!
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "style: auto-format code with clang-format"